<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miuxic - Audio a Partitura</title>
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.2.2/dist/abcjs-basic-min.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: #1a1a1a; 
            color: white; 
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: #2d2d2d; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button { 
            background-color: #6200ea; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }
        button:hover {
            background-color: #7c4dff;
        }
        #paper { 
            background: white; 
            margin-top: 30px; 
            border-radius: 5px; 
            color: black; 
            padding: 10px;
            overflow-x: auto;
        }
        .loading { 
            display: none; 
            color: #ffeb3b; 
            margin-top: 15px; 
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>miuxic</h1>
        <p>Sube una melodía para generar su partitura</p>
        
        <input type="file" id="audioInput" accept="audio/*">
        <br>
        <button onclick="uploadAudio()">Generar Partitura</button>
        
        <p id="loadingText" class="loading">Escuchando audio y creando partitura... (Si el servidor estaba dormido, puede tardar 1 minuto).</p>
        
        <div id="paper"></div>
    </div>

    <script>
        async function uploadAudio() {
            const fileInput = document.getElementById('audioInput');
            const loadingText = document.getElementById('loadingText');
            const paper = document.getElementById('paper');

            // Verificar que el usuario haya seleccionado un archivo
            if (!fileInput.files[0]) {
                alert("Por favor selecciona un archivo de audio primero.");
                return;
            }

            // Mostrar el texto de espera y limpiar partituras anteriores
            loadingText.style.display = 'block';
            paper.innerHTML = '';

            // Preparar el archivo para enviarlo
            const formData = new FormData();
            formData.append('audio', fileInput.files[0]);

            try {
                // Enviar el archivo a tu servidor oficial en Render
                const response = await fetch('https://miuxic.onrender.com/transcribe', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.abc_code) {
                    // Ocultar texto de espera y dibujar la partitura con la herramienta visual
                    loadingText.style.display = 'none';
                    ABCJS.renderAbc("paper", data.abc_code);
                } else {
                    loadingText.innerText = "Error al procesar el audio: " + data.error;
                }
            } catch (error) {
                loadingText.innerText = "Error de conexión con el servidor. Revisa si Render ya terminó de cargar.";
            }
        }
    </script>
</body>
</html>
