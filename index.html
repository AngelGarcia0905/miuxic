<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miuxic | AI Sheet Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.2.2/dist/abcjs-basic-min.js"></script>
    <style>
        :root {
            /* DARK MODE Colors */
            --m-color: #9c0720;
            --i-color: #aaaaaa;
            --ux-color: #4c007d;
            --c-color: #00276a;
            --bg: #0a0a0a; 
            --card: #161616; 
            --text-base: #ffffff;
            --cat-fill: #888888;
        }

        [data-theme="light"] {
            /* LIGHT MODE Colors */
            --m-color: #f1666d;  
            --i-color: #555555;
            --ux-color: #bc4ed8; 
            --c-color: #5b7dcf;  
            --bg: #f5f5f5; 
            --card: #ffffff; 
            --text-base: #1a1a1a;
            --cat-fill: #666666;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text-base);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: 0.3s;
        }

        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Logo Area */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -2px; }
        .m { color: var(--m-color); }
        .i { color: var(--i-color); }
        .ux { color: var(--ux-color); }
        .c { color: var(--c-color); }

        .theme-btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid var(--ux-color);
            background: transparent;
            color: var(--text-base);
            cursor: pointer;
            font-weight: 700;
        }

        .main-content { text-align: center; width: 100%; max-width: 500px; }

        .upload-box {
            background: var(--card);
            border: 2px dashed var(--ux-color);
            border-radius: 20px;
            padding: 40px 20px;
            margin: 30px 0;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .upload-box:hover { transform: scale(1.01); border-color: var(--m-color); }

        .platform-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 700; color: white; cursor: pointer; }
        .yt { background: #FF0000; }
        .sp { background: #1DB954; }

        .action-btn {
            width: 100%; padding: 18px; margin-top: 25px; border: none;
            border-radius: 35px; font-weight: 900; font-size: 1rem;
            background: linear-gradient(90deg, var(--ux-color), var(--m-color));
            color: white; cursor: pointer;
            transition: 0.2s;
        }

        #paper { 
            background: white; 
            margin-top: 30px; 
            border-radius: 10px; 
            color: black; 
            padding: 15px;
            display: none;
            width: 100%;
        }
        
        .loading { display: none; color: var(--ux-color); margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <svg width="50" height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 50 Q20 15 50 15 Q80 15 80 50" fill="none" stroke="#444" stroke-width="5" />
                <circle cx="50" cy="55" r="30" fill="var(--cat-fill)" />
                <path d="M25 40 L35 25 L45 45 Z" fill="var(--cat-fill)" />
                <path d="M75 40 L65 25 L55 45 Z" fill="var(--cat-fill)" />
                <rect x="12" y="45" width="12" height="20" rx="5" fill="#222" />
                <rect x="76" y="45" width="12" height="20" rx="5" fill="#222" />
                <circle cx="40" cy="55" r="3" fill="#1a1a1a" />
                <circle cx="60" cy="55" r="3" fill="#1a1a1a" />
                <path d="M48 63 L52 63 L50 66 Z" fill="#1a1a1a" />
            </svg>
            <div class="logo">
                <span class="m">m</span><span class="i">i</span><span class="ux">ux</span><span class="i">i</span><span class="c">c</span>
            </div>
        </div>
        <button class="theme-btn" id="themeToggle">LIGHT MODE</button>
    </header>

    <main class="main-content">
        <input type="file" id="audioInput" accept="audio/*" style="display: none;">
        
        <div class="upload-box" id="uploadTrigger">
            <span style="font-size: 3rem;">📁</span>
            <h3>Upload Song</h3>
            <p id="fileStatus" style="opacity: 0.6; font-size: 0.8rem;">Click to select audio file</p>
        </div>

        <div class="platform-btns">
            <button class="btn yt">YouTube</button>
            <button class="btn sp">Spotify</button>
        </div>

        <button class="action-btn" id="generateBtn">GENERATE SHEET MUSIC</button>
        
        <p id="loadingText" class="loading">Analyzing audio with AI...</p>
        <div id="paper"></div>
    </main>

    <script>
        const themeBtn = document.getElementById('themeToggle');
        const uploadTrigger = document.getElementById('uploadTrigger');
        const fileInput = document.getElementById('audioInput');
        const fileStatus = document.getElementById('fileStatus');
        const generateBtn = document.getElementById('generateBtn');
        const loadingText = document.getElementById('loadingText');
        const paper = document.getElementById('paper');

        // Theme Toggle
        themeBtn.onclick = () => {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
                themeBtn.innerText = "LIGHT MODE";
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeBtn.innerText = "DARK MODE";
            }
        };

        // File Selection
        uploadTrigger.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            if(fileInput.files[0]) fileStatus.innerText = "Selected: " + fileInput.files[0].name;
        };

        // Generate Music Logic
        generateBtn.onclick = async () => {
            if (!fileInput.files[0]) return alert("Please select a file first");

            loadingText.style.display = 'block';
            paper.style.display = 'none';

            const formData = new FormData();
            formData.append('audio', fileInput.files[0]);

            try {
                const response = await fetch('https://miuxic.onrender.com/transcribe', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.abc_code) {
                    loadingText.style.display = 'none';
                    paper.style.display = 'block';
                    ABCJS.renderAbc("paper", data.abc_code);
                } else {
                    loadingText.innerText = "Error: " + data.error;
                }
            } catch (e) {
                loadingText.innerText = "Server error. Check if Render is awake.";
            }
        };
    </script>
</body>
</html>
