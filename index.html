<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miuxic | UI Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* DARK MODE (Black Background) */
            --m-color: #9c0720;  /* Red */
            --i-color: #aaaaaa;  /* LIGHT Grey (to stand out on black) */
            --ux-color: #4c007d; /* Purple */
            --c-color: #00276a;  /* Blue */
            --bg: #0a0a0a; 
            --card: #161616; 
            --text-base: #ffffff;
        }

        [data-theme="light"] {
            /* LIGHT MODE (White Background) */
            --m-color: #f1666d;  /* Light Red */
            --i-color: #555555;  /* DARK Grey (to stand out on white) */
            --ux-color: #bc4ed8; /* Light Purple */
            --c-color: #5b7dcf;  /* Light Blue */
            --bg: #f5f5f5; 
            --card: #ffffff; 
            --text-base: #1a1a1a;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text-base);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: 0.3s;
        }

        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; }
        .m { color: var(--m-color); }
        .i { color: var(--i-color); }
        .ux { color: var(--ux-color); }
        .c { color: var(--c-color); }

        .theme-btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid var(--ux-color);
            background: transparent;
            color: var(--text-base);
            cursor: pointer;
            font-weight: 700;
        }

        .main-content { text-align: center; width: 100%; max-width: 500px; }

        .upload-box {
            background: var(--card);
            border: 2px dashed var(--ux-color);
            border-radius: 20px;
            padding: 50px 20px;
            margin: 40px 0;
            cursor: pointer;
        }

        .platform-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 700; color: white; cursor: pointer; }
        .yt { background: #FF0000; }
        .sp { background: #1DB954; }
        
        .create-acc {
            width: 100%; padding: 18px; margin-top: 30px; border: none;
            border-radius: 35px; font-weight: 900; font-size: 1rem;
            background: linear-gradient(90deg, var(--ux-color), var(--m-color));
            color: white; cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <span class="m">m</span><span class="i">i</span><span class="ux">ux</span><span class="i">i</span><span class="c">c</span>
        </div>
        <button class="theme-btn" id="themeToggle">LIGHT MODE</button>
    </header>

    <main class="main-content">
        <div class="upload-box">
            <span style="font-size: 3rem;">📁</span>
            <h3>Upload Song</h3>
            <p style="opacity: 0.6; font-size: 0.8rem; margin-top: 10px;">Drag and drop or select a file</p>
        </div>

        <div class="platform-btns">
            <button class="btn yt">YouTube</button>
            <button class="btn sp">Spotify</button>
        </div>

        <button class="create-acc">CREATE ACCOUNT</button>
    </main>

    <script>
        const btn = document.getElementById('themeToggle');
        btn.onclick = () => {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
                btn.innerText = "LIGHT MODE";
            } else {
                document.body.setAttribute('data-theme', 'light');
                btn.innerText = "DARK MODE";
            }
        };
    </script>
</body>
</html>
