<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miuxic | Prototipo Visual</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --m-color: #9c0720; --ux-color: #4c007d; --ic-color: #00276a;
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
        }

        [data-theme="light"] {
            --m-color: #f1666d; --ux-color: #bc4ed8; --ic-color: #5b7dcf;
            --bg: #f5f5f5; --card: #ffffff; --text: #1a1a1a;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Cabecera y Switch */
        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; }
        .m { color: var(--m-color); } .ux { color: var(--ux-color); } .ic { color: var(--ic-color); }

        .btn-nav {
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--ux-color);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-weight: 700;
        }

        /* Contenedor Central */
        .main-content {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        /* Botón Principal Subir */
        .upload-area {
            background: var(--card);
            border: 2px dashed var(--ux-color);
            border-radius: 20px;
            padding: 40px;
            margin: 30px 0;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .upload-area:hover { transform: scale(1.02); }
        .upload-icon { font-size: 3rem; margin-bottom: 10px; display: block; }

        /* Botones de Plataformas */
        .platform-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-platform {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
        }

        .yt { background-color: #FF0000; } /* Color oficial YouTube */
        .sp { background-color: #1DB954; } /* Color oficial Spotify */

        .btn-account {
            margin-top: 30px;
            background: linear-gradient(90deg, var(--ux-color), var(--m-color));
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
        }

        /* Responsive Full HD */
        @media (min-width: 1200px) {
            .logo { font-size: 4rem; }
            .main-content { max-width: 700px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <span class="m">m</span><span class="ux">ux</span><span class="ic">ic</span>
        </div>
        <button class="btn-nav" id="themeToggle">MODO CLARO</button>
    </header>
